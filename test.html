<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 给你的留言 ❤️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #fbc2c2, #f8e0e0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 {
            color: #e74c3c;
            margin-bottom: 30px;
        }
        input {
            width: 80%;
            padding: 12px 15px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #e74c3c;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #c0392b;
        }
        .message {
            display: none; /* 初始隐藏 */
            margin-top: 30px;
            border-top: 2px dashed #e74c3c;
            padding-top: 20px;
            font-size: 18px;
            color: #2c3e50;
            white-space: pre-wrap; /* 保留换行 */
            line-height: 1.8;
        }
        .error {
            color: red;
            font-size: 14px;
            min-height: 20px;
        }
        .locked-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 锁定状态 -->
        <div id="lockScreen">
            <div class="locked-icon">🔒</div>
            <h2>请输入密码</h2>
            <input type="password" id="passwordInput" placeholder="输入密码..." autofocus>
            <br>
            <button onclick="checkPassword()">解锁</button>
            <div class="error" id="errorMsg"></div>
        </div>

        <!-- 留言内容（初始隐藏） -->
        <div id="messageContent" class="message">
            <!-- 在这里写你想对她说的话，支持换行 -->
            ❤️ 亲爱的：<br><br>
            这是我特意为你准备的小惊喜。<br>
            遇见你是我最大的幸运。<br>
            希望今天你的心情像阳光一样灿烂！<br><br>
            永远爱你的 XX 💕
        </div>
    </div>
    
    <script>
        function checkPassword() {
            // 设置你的密码
            const correctPassword = "520520";  // ← 在这里修改成你想要的密码
    
            const input = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMsg');
            const lockScreen = document.getElementById('lockScreen');
            const message = document.getElementById('messageContent');
    
            if (input.value === correctPassword) {
                // 密码正确：隐藏密码框区域，显示留言
                lockScreen.style.display = 'none';
                message.style.display = 'block';
            } else {
                // 密码错误：提示
                errorMsg.textContent = '密码错误，再试试吧~';
                input.value = ''; // 清空输入
                input.focus();
            }
        }
    
        // 按回车键也可以解锁
        document.getElementById('passwordInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
